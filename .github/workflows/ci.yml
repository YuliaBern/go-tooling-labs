name: Go CI

on:
  push:
    branches:
      - main
    pull_request:
      branches:
        - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - run: go mod tidy
      - run: go mod verify

      - name: Install golangci-lint
        run: |
          go clean -modcache
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.57.2

      - name: Run lint
        run: golangci-lint run --timeout=5m

      - name: Run tests
        run: make test